name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  NX_DAEMON: false
  # PR: diff vs refs/remotes/origin/master
  # Push to master: event.before→sha
  NX_BASE: ${{ github.event_name == 'push' && github.event.before || 'refs/remotes/origin/master' }}
  NX_HEAD: ${{ github.event_name == 'push' && github.sha || 'HEAD' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch master
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --no-recurse-submodules --filter=blob:none origin +master:refs/heads/master
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Yarn Install
        run: |
          yarn install --immutable --immutable-cache
      - name: Run lint
        run: |
          yarn nx affected -t eslint:lint --fix=false --max-warnings=0 --parallel=3
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch master
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --no-recurse-submodules --filter=blob:none origin +master:refs/heads/master
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Yarn Install
        run: |
          yarn install --immutable --immutable-cache
      - name: Run Tests
        run: |
          yarn nx affected -t test --parallel=3
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }} # Force checking of the whole repo when running on pushes to master
          fetch-depth: 0
      - name: Fetch master
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --no-recurse-submodules --filter=blob:none origin +master:refs/heads/master
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Yarn Install
        run: |
          yarn install --immutable --immutable-cache
      - name: Check Formatting (Changed Files)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          yarn biome ci --changed --no-errors-on-unmatched
      - name: Check Formatting
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          yarn biome ci
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch master
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --no-recurse-submodules --filter=blob:none origin +master:refs/heads/master
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Yarn Install
        run: |
          yarn install --immutable --immutable-cache
      - name: Check types
        run: |
          yarn nx affected -t typecheck --parallel=3
  gen-file:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Get Cache Key
        id: get-cache-key
        run: |
          echo "key=$(git ls-tree -r HEAD | grep '^160000' | sha256sum | cut -d " " -f 1)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: .git/modules
          key: submodule-${{ steps.get-cache-key.outputs.key }}
          restore-keys: |
            submodule-
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Sparse Checkout
        run: |
          $(cd libs/gi/dm/GenshinData  && git sparse-checkout set TextMap ExcelBinOutput)
          $(cd libs/sr/dm/StarRailData && git sparse-checkout set TextMap ExcelOutput)
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Yarn Install
        run: |
          yarn install --immutable --immutable-cache
      - name: Check Gen File
        run: |
          yarn run nx run-many -t gen-file
          test -z "$(git status --porcelain | tee /dev/stderr)"
